# Produces the same ZIP as `npm run build:amo` locally. Download from the Actions run summary (Artifacts).
name: Build AMO package
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      # Skip Playwright browser download; only web-ext is needed for the store zip.
      - run: npm ci --ignore-scripts
      - run: npm run build:amo
      - uses: actions/upload-artifact@v4
        with:
          name: firefox-amo-zip
          path: dist-amo/*.zip
          if-no-files-found: error
